<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aalian's District Express</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --success: #00ff88;
            --bg: #0b0f19;
            --card: #161e2d;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #0f172a;
        }

        .hero-name { font-size: 1.4rem; margin: 5px 0; letter-spacing: 1px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 25px 20px;
        }

        .tile {
            background: var(--card);
            border-radius: 18px;
            padding: 15px 5px;
            text-align: center;
            border: 1px solid #2d3748;
        }

        .tile:active { background: var(--primary); }

        .input-section { padding: 0 20px; }
        
        .glass-input {
            width: 100%;
            background: var(--card);
            border: 1px solid #2d3748;
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .row { display: flex; gap: 10px; }

        .order-btn {
            width: 100%;
            background: #25D366; /* WhatsApp Green */
            color: white;
            padding: 16px;
            border-radius: 15px;
            font-weight: 800;
            border: none;
            font-size: 1rem;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .order-btn:active { transform: scale(0.98); }

        .orders-container { padding: 25px 20px; }
        
        .order-card {
            background: #ffffff;
            color: #1e293b;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .done-btn { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar">A</div>
        <div class="hero-name">AALIAN'S EXPRESS</div>
        <span style="color: var(--success); font-size: 0.8rem;">● Online Delivery Service</span>
    </div>

    <div class="grid-container">
        <div class="tile" onclick="quick('Milk 🥛')"><span>🥛</span><br><small>Milk</small></div>
        <div class="tile" onclick="quick('Vegetables 🥗')"><span>🥗</span><br><small>Veg</small></div>
        <div class="tile" onclick="quick('Bread 🍞')"><span>🍞</span><br><small>Bread</small></div>
        <div class="tile" onclick="quick('Eggs 🥚')"><span>🥚</span><br><small>Eggs</small></div>
    </div>

    <div class="input-section">
        <input type="text" id="who" class="glass-input" placeholder="Order kiske liye hai?">
        <input type="text" id="what" class="glass-input" placeholder="Kya cheez chahiye?">
        <input type="text" id="qty" class="glass-input" placeholder="Kitni quantity? (e.g. 2 KG, 1 Dozen)">
        <button class="order-btn" onclick="sendWhatsApp()">SEND TO AALIAN 📱</button>
    </div>

    <div class="orders-container" id="orderList">
        <p style="color: var(--text-dim); text-align: center;">Recent Orders:</p>
    </div>

    <script>
        function quick(item) {
            document.getElementById('what').value = item;
        }

        function sendWhatsApp() {
            const who = document.getElementById('who').value || "Ghar wale";
            const what = document.getElementById('what').value;
            const qty = document.getElementById('qty').value || "1";
            const myNumber = "923125438331"; // Aapka number set kar diya hai

            if(!what) return alert("Aalian ko batayen toh sahi kya chahiye!");

            // WhatsApp Message Formatting
            const message = `*Naya Order!* 🚀%0A--------------------%0A*Cheez:* ${what}%0A*Quantity:* ${qty}%0A*Kiske liye:* ${who}%0A--------------------%0A_District Express_`;

            const whatsappUrl = `https://wa.me/${myNumber}?text=${message}`;
            
            // Open WhatsApp
            window.open(whatsappUrl, '_blank');

            // Add to Local List
            const list = document.getElementById('orderList');
            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div>
                    <b>${what} (${qty})</b><br>
                    <small>For: ${who}</small>
                </div>
                <button class="done-btn" onclick="this.parentElement.remove()">✔</button>
            `;
            list.prepend(card);

            // Clear inputs
            document.getElementById('what').value = "";
            document.getElementById('qty').value = "";
        }
    </script>
</body>
</html>
